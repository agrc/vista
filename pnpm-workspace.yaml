# Enforce a 7-day (10,080 minutes) quarantine
minimumReleaseAge: 10080

# Fail the build if metadata/timestamps are missing
minimumReleaseAgeStrict: true

# EXCLUSIONS: Critical to prevent 7-day delays on stable tools
minimumReleaseAgeExclude:
  - '@ugrc/*'
  - uuid@11.1.1
  - esbuild@0.28.1

onlyBuiltDependencies:
  - core-js
  - core-js-pure
  - esbuild

allowBuilds:
  core-js: true
  esbuild: true
  protobufjs: true
  re2: true
